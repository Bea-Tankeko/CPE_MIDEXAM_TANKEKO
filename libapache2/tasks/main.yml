---
- name: Install nagios for Ubuntu
  hosts: all
  become: yes
  tasks:

  - name: Show detected OS
    debug:
      var: ansible_distribution

  - name: Ensure minimal build tools (gcc, make, wget, php)
    package:
      name:
        - gcc
        - make
        - wget
        - php
      state: present

  - name: Ensure web server installed
    package:
      name: "{{ 'apache2' if ansible_distribution | lower == 'ubuntu' else 'httpd' }}"
      state: present

  - name: Add PHP support for Apache on Ubuntu
    apt:
      name: libapache2-mod-php
      state: present
      update_cache: yes
    when: ansible_distribution | lower == "ubuntu"

  - name: Download Nagios Core
    get_url:
      url: https://assets.nagios.com/downloads/nagioscore/releases/nagios-4.4.14.tar.gz
      dest: /tmp/nagios.tar.gz

  - name: Extract Nagios
    unarchive:
      src: /tmp/nagios.tar.gz
      dest: /tmp
      remote_src: yes

  - name: Compile and install Nagios
    shell: |
      cd /tmp/nagios-4.4.14
      ./configure
      make all
      make install
      make install-init
      make install-commandmode
      make install-config
      make install-webconf
    args:
      executable: /bin/bash

  - name: Start web server
    service:
      name: "{{ 'apache2' if ansible_distribution | lower == 'ubuntu' else 'httpd' }}"
      state: started
      enabled: yes

  - name: Start Nagios service
    service:
      name: nagios
      state: started
      enabled: yes