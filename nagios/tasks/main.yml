---
- name: Show detected OS
  debug:
    var: ansible_distribution

- name: Install dependencies (Ubuntu)
  apt:
    name:
      - apache2
      - build-essential
      - libgd-dev
      - libssl-dev
      - unzip
      - php
      - libapache2-mod-php
      - wget
      - curl
      - apache2-utils
    state: present
    update_cache: yes
  when: ansible_distribution | lower == "ubuntu"

- name: Install dependencies (CentOS)
  yum:
    name:
      - "@Development Tools"
      - gd-devel
      - openssl-devel
      - unzip
      - httpd
      - php
      - wget
      - curl
      - mod_fcgid
      - httpd-tools
    state: present
  when: ansible_distribution | lower == "centos"

- name: Create nagios and nagcmd groups
  group:
    name: "{{ item }}"
    state: present
  loop:
    - nagios
    - nagcmd

- name: Create nagios user
  user:
    name: nagios
    group: nagios
    create_home: yes
    shell: /bin/bash

- name: Add nagios to nagcmd group
  user:
    name: nagios
    groups: nagcmd
    append: yes

- name: Add Apache user to nagcmd group
  user:
    name: "{{ 'www-data' if ansible_distribution | lower == 'ubuntu' else 'apache' }}"
    groups: nagcmd
    append: yes

- name: Download Nagios Core
  get_url:
    url: https://assets.nagios.com/downloads/nagioscore/releases/nagios-4.4.14.tar.gz
    dest: /tmp/nagios.tar.gz
    mode: '0644'

- name: Extract Nagios Core
  unarchive:
    src: /tmp/nagios.tar.gz
    dest: /tmp
    remote_src: yes

- name: Compile and install Nagios Core
  shell: |
    ./configure --with-command-group=nagcmd
    make all
    make install
    make install-init
    make install-commandmode
    make install-config
    make install-webconf
  args:
    chdir: /tmp/nagios-4.4.14
    executable: /bin/bash

- name: Enable Apache CGI (Ubuntu)
  command: a2enmod cgi
  when: ansible_distribution | lower == "ubuntu"

- name: Enable Apache rewrite (Ubuntu)
  command: a2enmod rewrite
  when: ansible_distribution | lower == "ubuntu"

- name: Restart Apache (Ubuntu)
  service:
    name: apache2
    state: restarted
  when: ansible_distribution | lower == "ubuntu"

- name: Disable SELinux temporarily (CentOS)
  command: setenforce 0
  ignore_errors: yes
  when: ansible_distribution | lower == "centos"

- name: Set SELinux to permissive permanently (CentOS)
  selinux:
    policy: targeted
    state: permissive
  when: ansible_distribution | lower == "centos"

- name: Download Nagios Plugins
  get_url:
    url: https://nagios-plugins.org/download/nagios-plugins-2.3.3.tar.gz
    dest: /tmp/nagios-plugins.tar.gz
    mode: '0644'

- name: Extract Nagios Plugins
  unarchive:
    src: /tmp/nagios-plugins.tar.gz
    dest: /tmp
    remote_src: yes

- name: Compile and install Nagios Plugins
  shell: |
    ./configure --with-nagios-user=nagios --with-nagios-group=nagios
    make
    make install
  args:
    chdir: /tmp/nagios-plugins-2.3.3
    executable: /bin/bash

- name: Fix Nagios permissions
  file:
    path: /usr/local/nagios
    owner: nagios
    group: nagios
    recurse: yes

- name: Ensure htpasswd file exists
  stat:
    path: /usr/local/nagios/etc/htpasswd.users
  register: nagios_htpasswd

- name: Create Nagios web user
  command: >
    htpasswd {{ '-b -c' if not nagios_htpasswd.stat.exists else '-b' }}
    /usr/local/nagios/etc/htpasswd.users nagios 123
  ignore_errors: yes

- name: Reload systemd
  command: systemctl daemon-reload
  ignore_errors: yes

- name: Restart Apache
  service:
    name: "{{ 'apache2' if ansible_distribution | lower == 'ubuntu' else 'httpd' }}"
    state: restarted
    enabled: yes

- name: Verify Nagios configuration
  shell: /usr/local/nagios/bin/nagios -v /usr/local/nagios/etc/nagios.cfg
  register: nagios_check
  failed_when: "'Things look okay' not in nagios_check.stdout"

- name: Restart Nagios
  service:
    name: nagios
    state: restarted
    enabled: yes

- name: Open HTTP port (Ubuntu)
  ufw:
    rule: allow
    port: 80
    proto: tcp
  when: ansible_distribution | lower == "ubuntu"

- name: Open HTTP port (CentOS)
  firewalld:
    service: http
    permanent: yes
    state: enabled
    immediate: yes
  when: ansible_distribution | lower == "centos"